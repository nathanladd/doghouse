<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rudi-HQ</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .home-wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .site-header {
      text-align: center;
      padding: 48px 24px 40px;
      border-bottom: 2px solid #AFC8E8;
      margin-bottom: 40px;
    }
    .site-header .eyebrow {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888888;
      margin-bottom: 12px;
    }
    .site-header h1 {
      font-size: 48px;
      font-weight: 700;
      color: #0078d4;
      border: none;
      padding: 0;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
    }
    .site-header .tagline {
      font-size: 16px;
      color: #555555;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="home-wrapper">

    <header class="site-header">
      <div class="eyebrow">Dog House</div>
      <h1>Rudi-HQ</h1>
      <p class="tagline">Your training and tools platform.</p>
    </header>

  </div>
</body>
</html>
